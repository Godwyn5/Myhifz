<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyHifz — Ton Plan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:wght@400;500&family=Amiri:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #F5F0E6;
      color: #163026;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      opacity: 0;
      animation: bodyFadeIn 0.5s ease forwards;
    }

    @keyframes bodyFadeIn {
      to { opacity: 1; }
    }

    /* FADE IN UP */
    .fade-up {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .fade-up.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* LAYOUT */
    .page-wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }

    /* HEADER */
    .header {
      text-align: center;
      margin-bottom: 48px;
    }

    .logo {
      font-family: 'Amiri', serif;
      font-weight: 700;
      font-size: 24px;
      color: #163026;
      display: block;
    }

    .badge {
      display: inline-block;
      margin-top: 16px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 11px;
      letter-spacing: 2px;
      color: #B8962E;
      border: 1px solid #B8962E;
      border-radius: 20px;
      padding: 5px 16px;
      text-transform: uppercase;
    }

    /* HERO TITLE */
    .hero {
      text-align: center;
      margin-bottom: 40px;
      animation: heroFadeIn 0.6s ease 0.1s both;
    }

    @keyframes heroFadeIn {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: 52px;
      color: #163026;
      line-height: 1.15;
    }

    .hero-name {
      font-style: italic;
      color: #B8962E;
    }

    .hero-subtitle {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 18px;
      color: #6B6357;
      margin-top: 16px;
    }

    /* CARDS */
    .card {
      background: #FFFFFF;
      border-radius: 20px;
      box-shadow: 0 8px 48px rgba(15, 35, 24, 0.08);
      padding: 48px;
      max-width: 600px;
      margin: 0 auto;
    }

    /* STATS CARD */
    .stats-card {
      margin-bottom: 24px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1px 1fr 1px 1fr;
      align-items: center;
      gap: 0;
    }

    .stat-divider {
      background-color: #E2D9CC;
      width: 1px;
      height: 80px;
      align-self: center;
    }

    .stat-col {
      text-align: center;
      padding: 0 16px;
    }

    .stat-number {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 64px;
      color: #163026;
      line-height: 1;
      display: block;
    }

    .stat-label {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 11px;
      letter-spacing: 2px;
      color: #B8962E;
      text-transform: uppercase;
      display: block;
      margin-top: 10px;
    }

    .stat-sublabel {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 13px;
      color: #6B6357;
      display: block;
      margin-top: 4px;
    }

    /* SESSION CARD */
    .session-card {
      margin-bottom: 24px;
    }

    .section-label {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 11px;
      letter-spacing: 2px;
      color: #B8962E;
      text-transform: uppercase;
      margin-bottom: 24px;
      display: block;
    }

    .session-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 0;
    }

    .session-row + .session-row {
      border-top: 1px solid #F5F0E6;
    }

    .session-bar {
      width: 3px;
      height: 36px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .session-bar.gold { background-color: #B8962E; }
    .session-bar.green { background-color: #163026; }

    .session-text {
      font-family: 'Playfair Display', serif;
      font-weight: 500;
      font-size: 17px;
      color: #163026;
    }

    /* MOTIVATION CARD */
    .motivation-wrap {
      background-color: #EDE5D0;
      border-radius: 16px;
      padding: 32px;
      max-width: 600px;
      margin: 0 auto 40px;
      text-align: center;
    }

    .motivation-text {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 20px;
      color: #163026;
      max-width: 500px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* CTA */
    .cta-wrap {
      text-align: center;
      margin-top: 40px;
    }

    .cta-btn {
      display: inline-block;
      background-color: #163026;
      color: #FFFFFF;
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: 18px;
      padding: 18px 56px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(15, 35, 24, 0.25);
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      animation: ctaPulse 2.5s ease-in-out infinite;
    }

    .cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(15, 35, 24, 0.38);
      animation: none;
    }

    @keyframes ctaPulse {
      0%, 100% { box-shadow: 0 8px 32px rgba(15, 35, 24, 0.25); }
      50%       { box-shadow: 0 8px 48px rgba(15, 35, 24, 0.42); }
    }

    /* MOBILE */
    @media (max-width: 600px) {
      .card {
        padding: 32px 24px;
      }

      .hero-title {
        font-size: 38px;
      }

      .stat-number {
        font-size: 44px;
      }

      .stat-label {
        font-size: 10px;
        letter-spacing: 1px;
      }
    }

    @media (max-width: 375px) {
      .hero-title {
        font-size: 32px;
      }

      .stat-number {
        font-size: 36px;
      }

      .cta-btn {
        padding: 18px 32px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

  <div class="page-wrap">

    <!-- HEADER -->
    <header class="header fade-up">
      <span class="logo">MyHifz</span>
      <span class="badge">Plan personnalisé</span>
    </header>

    <!-- HERO -->
    <div class="hero">
      <h1 class="hero-title">
        Deviens Hafiz,<br>
        <span class="hero-name" id="hero-name"></span>
      </h1>
      <p class="hero-subtitle">Ton plan est prêt. Il ne reste qu'à commencer.</p>
    </div>

    <!-- STATS CARD -->
    <div class="card stats-card fade-up" style="transition-delay: 0.2s">
      <div class="stats-grid">
        <div class="stat-col">
          <span class="stat-number" id="stat-ayat">0</span>
          <span class="stat-label">Ayat</span>
          <span class="stat-sublabel">par semaine</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-col">
          <span class="stat-number" id="stat-days">0</span>
          <span class="stat-label">Jours</span>
          <span class="stat-sublabel">par semaine</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-col">
          <span class="stat-number" id="stat-min">0</span>
          <span class="stat-label">Min</span>
          <span class="stat-sublabel">par session</span>
        </div>
      </div>
    </div>

    <!-- SESSION CARD -->
    <div class="card session-card fade-up" style="transition-delay: 0.4s">
      <span class="section-label">Structure d'une session</span>
      <div class="session-row">
        <div class="session-bar gold"></div>
        <span class="session-text" id="session-mem">Nouvelle mémorisation — 0min</span>
      </div>
      <div class="session-row">
        <div class="session-bar green"></div>
        <span class="session-text" id="session-rev">Révision quotidienne — 0min</span>
      </div>
    </div>

    <!-- MOTIVATION -->
    <div class="motivation-wrap fade-up" style="transition-delay: 0.6s">
      <p class="motivation-text" id="motivation-text"></p>
    </div>

    <!-- CTA -->
    <div class="cta-wrap fade-up" style="transition-delay: 0.7s">
      <button class="cta-btn" onclick="navigateTo('register.html')">Commencer mon Hifz →</button>
    </div>

  </div>

  <script>
    function navigateTo(url) {
      document.body.style.transition = 'opacity 0.35s ease';
      document.body.style.opacity = '0';
      setTimeout(() => { window.location.href = url; }, 350);
    }

    /* ── PLAN CALCULATION ── */
    const timeMap = {
      '10': { ayat: 3,  days: 5, min: 10, memMin: 2,  revMin: 8  },
      '20': { ayat: 5,  days: 5, min: 20, memMin: 6,  revMin: 14 },
      '30': { ayat: 7,  days: 5, min: 30, memMin: 8,  revMin: 22 },
      '45': { ayat: 10, days: 5, min: 45, memMin: 10, revMin: 35 },
    };

    const motivationMap = {
      'Me rapprocher d\'Allah':    'Chaque ayat mémorisé est une prière que tu porteras toute ta vie.',
      'Honorer une promesse':      'Tu as fait une promesse. Aujourd\'hui tu commences à la tenir.',
      'Me discipliner':            'La discipline commence ici. Un ayat à la fois.',
      'Devenir Hafiz':             'Le chemin commence aujourd\'hui. Et tu iras jusqu\'au bout.',
    };

    /* ── LOAD DATA ── */
    const userName    = localStorage.getItem('userName')    || '';
    const userTime    = localStorage.getItem('userTime')    || '20';
    const userIntention = localStorage.getItem('userIntention') || '';

    localStorage.setItem('userName', userName);

    const plan = timeMap[userTime] || timeMap['20'];

    /* ── POPULATE UI ── */
    document.getElementById('hero-name').textContent = (userName && userName.length > 0) ? userName : 'toi';

    document.getElementById('session-mem').textContent = `Nouvelle mémorisation — ${plan.memMin}min`;
    document.getElementById('session-rev').textContent = `Révision quotidienne — ${plan.revMin}min`;

    const motivation = motivationMap[userIntention] || 'Allah facilite le chemin de celui qui cherche à s\'en rapprocher.';
    document.getElementById('motivation-text').textContent = motivation;

    /* ── COUNT UP ANIMATION ── */
    function countUp(el, target, duration) {
      const start = performance.now();
      function tick(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        el.textContent = Math.floor(eased * target);
        if (progress < 1) requestAnimationFrame(tick);
        else el.textContent = target;
      }
      requestAnimationFrame(tick);
    }

    /* ── INTERSECTION OBSERVER ── */
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          if (entry.target.classList.contains('stats-card')) {
            setTimeout(() => {
              countUp(document.getElementById('stat-ayat'), plan.ayat, 1500);
              countUp(document.getElementById('stat-days'), plan.days, 1500);
              countUp(document.getElementById('stat-min'),  plan.min,  1500);
            }, 200);
          }
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15 });

    document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
  </script>

</body>
</html>
